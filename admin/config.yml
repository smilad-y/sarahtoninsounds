backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "essays"
    label: "Essays"
    folder: "essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["essay", "culture", "memory", "music supervision", "diaspora"]
      - label: "Excerpt"
        name: "excerpt"
        widget: "string"
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "music-picks"
    label: "Music Picks"
    folder: "music-picks"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Song Title"
        name: "title"
        widget: "string"
      - label: "Artist"
        name: "artist"
        widget: "string"
      - label: "Year"
        name: "year"
        widget: "string"
      - label: "Origin"
        name: "origin"
        widget: "string"
      - label: "Genre Tags"
        name: "genre"
        widget: "list"
      - label: "Why This Song"
        name: "why"
        widget: "text"
      - label: "Spotify Link"
        name: "spotify"
        widget: "string"
        required: false

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "about"
        label: "About Me"
        file: "settings/about.json"
        fields:
          - label: "Your Name"
            name: "name"
            widget: "string"
          - label: "Bio"
            name: "bio"
            widget: "markdown"
          - label: "Location"
            name: "location"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Credentials"
            name: "credentials"
            widget: "string"
      - name: "sidebar"
        label: "About This Place"
        file: "settings/sidebar.json"
        fields:
          - label: "Sidebar Blurb"
            name: "blurb"
            widget: "text"
